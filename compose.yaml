name: gyminators

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gyminators}
      POSTGRES_USER: ${POSTGRES_USER:-gyminators}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [internal]
    logging: *default-logging

  app:
    build: .
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?Set ALLOWED_HOSTS in .env}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:?Set CSRF_TRUSTED_ORIGINS in .env}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-gyminators}
      DB_USER: ${POSTGRES_USER:-gyminators}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JACKRABBIT_REPORTING_ENABLED: ${JACKRABBIT_REPORTING_ENABLED:-true}
      JACKRABBIT_ORG_ID: ${JACKRABBIT_ORG_ID:-154877}
      JACKRABBIT_WEBHOOK_TOKEN: ${JACKRABBIT_WEBHOOK_TOKEN:-}
      JACKRABBIT_WEBHOOK_PREVIOUS_TOKEN: ${JACKRABBIT_WEBHOOK_PREVIOUS_TOKEN:-}
      JACKRABBIT_WEBHOOK_MAX_BODY_BYTES: ${JACKRABBIT_WEBHOOK_MAX_BODY_BYTES:-32768}
      JACKRABBIT_CLASS_SYNC_TIMEOUT_SECONDS: ${JACKRABBIT_CLASS_SYNC_TIMEOUT_SECONDS:-15}
      JACKRABBIT_CLASS_STALE_AFTER_MINUTES: ${JACKRABBIT_CLASS_STALE_AFTER_MINUTES:-60}
    depends_on:
      db:
        condition: service_healthy
        restart: true
    networks: [internal]
    logging: *default-logging
    volumes:
      - media_data:/app/media

  class-sync:
    build: .
    restart: unless-stopped
    command: ["python", "manage.py", "sync_jackrabbit_classes", "--loop", "--interval", "${JACKRABBIT_CLASS_SYNC_INTERVAL_SECONDS:-900}"]
    # This worker does not listen on port 8000, so it must not inherit the web
    # image's HTTP health check.
    healthcheck:
      disable: true
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?Set ALLOWED_HOSTS in .env}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:?Set CSRF_TRUSTED_ORIGINS in .env}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-gyminators}
      DB_USER: ${POSTGRES_USER:-gyminators}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JACKRABBIT_REPORTING_ENABLED: ${JACKRABBIT_REPORTING_ENABLED:-true}
      JACKRABBIT_ORG_ID: ${JACKRABBIT_ORG_ID:-154877}
      JACKRABBIT_WEBHOOK_TOKEN: ${JACKRABBIT_WEBHOOK_TOKEN:-}
      JACKRABBIT_CLASS_SYNC_TIMEOUT_SECONDS: ${JACKRABBIT_CLASS_SYNC_TIMEOUT_SECONDS:-15}
      JACKRABBIT_CLASS_STALE_AFTER_MINUTES: ${JACKRABBIT_CLASS_STALE_AFTER_MINUTES:-60}
    depends_on:
      app:
        condition: service_healthy
    networks: [internal]
    logging: *default-logging

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - media_data:/srv/media:ro
    depends_on:
      app:
        condition: service_healthy
    networks: [internal]
    logging: *default-logging

  backup:
    image: postgres:17-alpine
    profiles: [backup]
    environment:
      PGHOST: db
      PGDATABASE: ${POSTGRES_DB:-gyminators}
      PGUSER: ${POSTGRES_USER:-gyminators}
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - ./backups:/backups
      - ./deploy/backup.sh:/usr/local/bin/backup:ro
      - ./deploy/restore.sh:/usr/local/bin/restore:ro
      - media_data:/media
    entrypoint: ["/bin/sh", "/usr/local/bin/backup"]
    depends_on:
      db:
        condition: service_healthy
    networks: [internal]
    logging: *default-logging

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  media_data:
